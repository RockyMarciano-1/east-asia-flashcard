<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="동아시아사">
<meta name="theme-color" content="#3C3489">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>동아시아사 플래시카드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --p:#534AB7;--pl:#EEEDFE;--pm:#AFA9EC;--pd:#3C3489;
  --t:#1a1a2e;--tm:#666680;--bg:#f0f0fb;--cb:#fff;
  --bo:rgba(83,74,183,0.18);--ok:#1D9E75;--okl:#E1F5EE
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:var(--bg);
  display:flex;flex-direction:column;
  height:100vh;height:100dvh
}
/* 헤더 */
.hd{background:var(--cb);border-bottom:1px solid var(--bo);padding:12px 18px 10px;flex-shrink:0}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.title{font-size:16px;font-weight:700;color:var(--pd)}
.pills{display:flex;gap:6px}
.pill{font-size:13px;padding:3px 11px;border-radius:100px;font-weight:600}
.pill.ok{background:var(--okl);color:var(--ok)}
.pill.lf{background:var(--pl);color:var(--pd)}
.pbar-wrap{background:#ddddf0;border-radius:100px;height:5px;overflow:hidden}
.pbar{height:100%;background:var(--p);border-radius:100px;transition:width .35s ease}
/* 본문 */
.main{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 14px 16px;gap:12px;overflow:hidden}
/* 모드 */
.modes{display:flex;gap:8px;width:100%}
.mb{flex:1;padding:11px 2px;border-radius:12px;border:1.5px solid var(--bo);background:var(--cb);color:var(--tm);font-size:14px;font-weight:600;font-family:inherit;-webkit-appearance:none;cursor:pointer}
.mb.on{background:var(--pl);border-color:var(--pm);color:var(--pd)}
/* 카운터 */
.cnt{font-size:14px;color:var(--tm);font-weight:500}
/* 카드 */
.cw{width:100%;flex:1;min-height:140px;position:relative;cursor:pointer;border-radius:20px}
.face{position:absolute;inset:0;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 20px 46px;transition:opacity .22s ease}
.front{background:var(--cb);border:1.5px solid var(--bo);box-shadow:0 3px 18px rgba(83,74,183,.10);opacity:1;z-index:2;pointer-events:auto}
.back{background:var(--pd);box-shadow:0 3px 18px rgba(83,74,183,.22);opacity:0;z-index:1;pointer-events:none}
.cw.flipped .front{opacity:0;pointer-events:none;z-index:1}
.cw.flipped .back{opacity:1;pointer-events:auto;z-index:2}
.qn{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--p);margin-bottom:12px}
.qt{font-size:19px;color:var(--t);text-align:center;line-height:1.75;font-weight:400;word-break:keep-all;overflow-y:auto;-webkit-overflow-scrolling:touch}
.hint{position:absolute;bottom:14px;font-size:13px;color:var(--tm)}
.al{font-size:12px;font-weight:700;letter-spacing:.12em;color:rgba(255,255,255,.5);margin-bottom:12px}
.at{font-size:29px;color:#fff;text-align:center;font-weight:700;line-height:1.5;word-break:keep-all}
/* 버튼 */
.btns{display:flex;gap:10px;width:100%;flex-shrink:0}
.btn{flex:1;padding:15px 0;border-radius:14px;border:1.5px solid var(--bo);background:var(--cb);color:var(--t);font-size:17px;font-weight:600;font-family:inherit;-webkit-appearance:none;cursor:pointer}
.btn:active{opacity:.7}
.btn.nx{background:var(--p);color:#fff;border-color:var(--p);flex:1.8}
.btns2{display:flex;gap:10px;width:100%;flex-shrink:0}
.btn2{flex:1;padding:12px 0;border-radius:12px;border:1.5px solid var(--bo);background:var(--cb);color:var(--tm);font-size:15px;font-weight:600;font-family:inherit;-webkit-appearance:none;cursor:pointer}
.btn2:active{opacity:.7}
.sw{font-size:12px;color:var(--tm);opacity:.55;flex-shrink:0}
/* 토스트 */
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(26,26,46,.9);color:#fff;font-size:15px;padding:11px 22px;border-radius:100px;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-height:650px){
  .main{gap:8px;padding:10px 12px 12px}
  .qt{font-size:17px}.at{font-size:24px}
  .btn{padding:12px 0;font-size:15px}.btn2{padding:10px 0;font-size:13px}
}
</style>
</head>
<body>
<div class="hd">
  <div class="hd-top">
    <div class="title">📚 동아시아사 플래시카드</div>
    <div class="pills">
      <span class="pill ok">✓ <span id="dc">0</span></span>
      <span class="pill lf">남은 <span id="lc">92</span></span>
    </div>
  </div>
  <div class="pbar-wrap"><div class="pbar" id="pb" style="width:1%"></div></div>
</div>
<div class="main" id="main">
  <div class="modes">
    <button class="mb on" onclick="setMode('random')">🔀 랜덤</button>
    <button class="mb" onclick="setMode('order')">📋 순서대로</button>
    <button class="mb" onclick="setMode('wrong')">❌ 틀린 것만</button>
  </div>
  <div class="cnt" id="cnt">1 / 92</div>
  <div class="cw" id="cw">
    <div class="face front">
      <div class="qn" id="qn">Q 1</div>
      <div class="qt" id="qt"></div>
      <div class="hint">탭하면 정답 확인 👆</div>
    </div>
    <div class="face back">
      <div class="al">정 답</div>
      <div class="at" id="at"></div>
    </div>
  </div>
  <div class="btns">
    <button class="btn" onclick="prev()">← 이전</button>
    <button class="btn nx" onclick="next()">다음 →</button>
  </div>
  <div class="btns2">
    <button class="btn2" onclick="markWrong()">❌ 틀림 표시</button>
    <button class="btn2" onclick="resetShuffle()">🔀 다시 섞기</button>
  </div>
  <div class="sw">← 스와이프로도 넘길 수 있어요 →</div>
</div>
<div class="toast" id="toast"></div>
<script>

var deck=[],idx=0,done=0,flipped=false,wrong=new Set(),mode='random';

function shuffle(a){
  var b=[].concat(a);
  for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}
  return b;
}
function setMode(m){
  mode=m;
  var btns=document.querySelectorAll('.mb');
  ['random','order','wrong'].forEach(function(v,i){btns[i].classList.toggle('on',v===m);});
  if(m==='wrong'){
    var wc=QA.filter(function(q){return wrong.has(q.n);});
    if(!wc.length){toast('틀림 표시된 문제가 없어요!');return;}
    deck=shuffle(wc);
  } else if(m==='order'){
    deck=QA.slice();
  } else {
    deck=shuffle(QA);
  }
  idx=0;done=0;flipped=false;render();
}
function render(){
  if(!deck.length)return;
  var q=deck[idx];
  document.getElementById('qn').textContent='Q '+q.n;
  document.getElementById('qt').textContent=q.q;
  document.getElementById('at').textContent=q.a;
  document.getElementById('cnt').textContent=(idx+1)+' / '+deck.length;
  document.getElementById('pb').style.width=Math.max(1,Math.round((idx+1)/deck.length*100))+'%';
  document.getElementById('dc').textContent=done;
  document.getElementById('lc').textContent=deck.length-done;
  var cw=document.getElementById('cw');
  cw.classList.remove('flipped');
  flipped=false;
}
function flip(){
  flipped=!flipped;
  document.getElementById('cw').classList.toggle('flipped',flipped);
}
function next(){
  if(flipped)done=Math.min(done+1,idx+1);
  if(idx<deck.length-1){idx++;}
  else{done=0;idx=0;if(mode==='random')deck=shuffle(QA);toast('🎉 한 바퀴 완료!');}
  render();
}
function prev(){if(idx>0){idx--;render();}}
function markWrong(){
  var q=deck[idx];
  if(wrong.has(q.n)){wrong.delete(q.n);toast('표시 해제 ✓');}
  else{wrong.add(q.n);toast('❌ 틀림 표시 '+wrong.size+'개');}
}
function resetShuffle(){
  deck=shuffle(mode==='wrong'?QA.filter(function(q){return wrong.has(q.n);}):QA);
  idx=0;done=0;flipped=false;render();toast('🔀 섞었습니다!');
}
var tt;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(tt);tt=setTimeout(function(){el.classList.remove('on');},2200);
}

/* 터치 스와이프 */
var tx=0,ty=0,mv=false;
document.getElementById('main').addEventListener('touchstart',function(e){
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;mv=false;
},{passive:true});
document.getElementById('main').addEventListener('touchmove',function(e){
  if(Math.abs(e.touches[0].clientX-tx)>8||Math.abs(e.touches[0].clientY-ty)>8)mv=true;
},{passive:true});
document.getElementById('main').addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx;
  var dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>35){
    if(dx<0)next();else prev();
  } else if(!mv||(Math.abs(dx)<12&&Math.abs(dy)<12)){
    if(!e.target.closest('button'))flip();
  }
},{passive:true});

/* 초기화 */
deck=shuffle(QA);
render();
</script>
